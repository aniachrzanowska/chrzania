  sections:
    summary:
      - bullet: "Experienced neuroscientist with 10+ years of expertise in behavioral systems neuroscience, specializing in rodent behavioral assays, neural circuit genetic manipulations, and neural activity recordings (*in vivo* freely-moving and head-fixed electrophysiology, two-photon calcium imaging). Skilled in experimental setup design, troubleshooting, and microsurgeries. Successful in securing fellowships and competitive training programs. Active in mentoring, organizing symposia and conferences, science popularization, and the international community of young neuroscientists."
    skills:
      - label: Technical
        details: Rodent behavioral assays, neural circuit genetic manipulations, in vivo electrophysiology (freely-moving & head-fixed), two-photon calcium imaging, microsurgeries, brain histology, viral injections, optogenetics, chemogenetics.
    education:
      - label: PhD in Biology, KU Leuven (2018–2023)
        details: "Arenberg Doctoral School, Leuven, Belgium. Dissertation: Unraveling the cell-type specific underpinnings that shape collicular-mediated visual behaviors. Supervisor: Dr. Karl Farrow (NERF)."
      - label: MSc in Neurobiology, Jagiellonian University (2015–2017)
        details: "Krakow, Poland. Dissertation: Circadian analysis of the orexin fibers distribution in the rat lateral geniculate nucleus of the thalamus. Supervisor: Prof. Dr. Marian H. Lewandowski."
      - label: BSc in Neurobiology, Jagiellonian University (2012–2015)
        details: "Krakow, Poland. Dissertation: Role of GABA-ergic innervation in the mammalian biological clock. Supervisor: Prof. Dr. Marian H. Lewandowski."
    research experience:
      - label: Postdoctoral Researcher — ICM, Paris Brain Institute (2024–present)
        details: "Bassem Hassan Lab, Paris, France. Investigating links between brain wiring structure, physiology, and behavior. In vivo two-photon calcium imaging in behaving flies; neurodevelopmental fly genetics."
      - label: PhD Researcher — NERF, imec / KU Leuven / VIB (2018–2023)
        details: "Karl Farrow Lab, Leuven, Belgium. Role of distinct neuronal cell types in visually-guided innate behaviors. In vivo freely-moving and head-fixed Neuropixels recordings; optogenetics, chemogenetics, viral injections."
      - label: Undergraduate Researcher — Jagiellonian University (2012–2017)
        details: "Marian H. Lewandowski Lab, Cracow, Poland. Circadian changes of orexinergic innervation in the rat visual system; brain histology"
      - label: Research Intern — NERF (2017)
        details: "Karl Farrow Lab, Leuven, Belgium. Behavioral protocol for visually-triggered orienting and defensive behaviors in virtual reality."
      - label: Research Intern — Leibniz-Institute for Molecular Pharmacology, FMP (2016–2017)
        details: "Ponomarenko / Korotkova Lab, Berlin, Germany. Sleep and memory regulation by forebrain circuits; optogenetics; in vivo local field potential recordings."
      - label: Research Intern — Intl. Institute of Molecular and Cell Biology (2016)
        details: "Kuźnicki Lab, Warsaw, Poland. *In situ* proximity ligation assay (PLA) on brain slices for Huntington's disease research."
      - label: Erasmus+ Trainee — Neuroscience Institute, CNR (2015)
        details: "Matteoli Lab, Milan, Italy. Role of Eps8 in synapse plasticity; Western blot analysis."
